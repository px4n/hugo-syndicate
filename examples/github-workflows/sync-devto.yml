name: Sync to dev.to

on:
  push:
    branches: [main, develop]
    paths: ["content/**/*.md"]
  workflow_dispatch:
    inputs:
      force_sync_all:
        description: "Force sync all posts"
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HUGO_BASE_URL: ${{ vars.HUGO_BASE_URL }}
          CONTENT_DIR: ${{ vars.CONTENT_DIR || 'content/' }}
          DEBUG_LEVEL: ${{ vars.DEBUG_LEVEL || '2' }}
          FORCE_SYNC_ALL: ${{ github.event.inputs.force_sync_all || 'false' }}
        run: npm run sync

      - name: Upload sync logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: |
            *.log
            logs/
          retention-days: 7

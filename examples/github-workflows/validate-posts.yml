name: Validate Posts

on:
  pull_request:
    paths: ["content/**/*.md"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate post format
        run: |
          # Create a validation script
          cat > validate-posts.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const fm = require('front-matter');
          const { execSync } = require('child_process');

          function validatePost(filePath) {
            try {
              const content = fs.readFileSync(filePath, 'utf8');

              if (!content.startsWith('---') && !content.startsWith('+++')) {
                throw new Error('Invalid front matter format');
              }

              let parsed;
              if (content.startsWith('---')) {
                parsed = fm(content);
              } else if (content.startsWith('+++')) {
                const tomlMatch = content.match(/^\+\+\+\n([\s\S]*?)\n\+\+\+\n([\s\S]*)$/);
                if (!tomlMatch) {
                  throw new Error('Invalid TOML front matter');
                }
                // Basic TOML validation
                const attributes = {};
                const lines = tomlMatch[1].split('\n');
                for (const line of lines) {
                  const trimmed = line.trim();
                  if (trimmed && !trimmed.startsWith('#')) {
                    const equalIndex = trimmed.indexOf('=');
                    if (equalIndex > 0) {
                      const key = trimmed.substring(0, equalIndex).trim();
                      let value = trimmed.substring(equalIndex + 1).trim();
                      if (value.startsWith('"') && value.endsWith('"')) {
                        value = value.slice(1, -1);
                      }
                      attributes[key] = value;
                    }
                  }
                }
                parsed = { attributes };
              }

              // Check required fields for dev.to sync
              if (parsed.attributes.devto === true || parsed.attributes.devto === 'true') {
                if (!parsed.attributes.title) {
                  throw new Error('devto posts must have a title');
                }
                if (!parsed.attributes.tags || !Array.isArray(parsed.attributes.tags)) {
                  console.warn(`Warning: ${filePath} - devto posts should have tags array`);
                }
                if (!parsed.attributes.categories || !parsed.attributes.categories.includes('dev.to')) {
                  console.warn(`Warning: ${filePath} - devto posts should include "dev.to" in categories`);
                }
              }

              console.log(`${filePath} - Valid`);
              return true;
            } catch (error) {
              console.error(`${filePath} - ${error.message}`);
              return false;
            }
          }

          // Get changed files
          let filesToCheck = [];
          try {
            const gitOutput = execSync('git diff --name-only origin/main...HEAD', { encoding: 'utf8' });
            filesToCheck = gitOutput.split('\n')
              .filter(Boolean)
              .filter(file => file.startsWith('content/posts/') && file.endsWith('.md'))
              .filter(file => fs.existsSync(file));
          } catch (error) {
            console.log('Could not get changed files, checking all posts');
            // Fallback to all posts
            function findMarkdownFiles(dir) {
              const files = [];
              if (!fs.existsSync(dir)) return files;
              const items = fs.readdirSync(dir);
              for (const item of items) {
                const fullPath = path.join(dir, item);
                if (fs.statSync(fullPath).isDirectory()) {
                  files.push(...findMarkdownFiles(fullPath));
                } else if (item.endsWith('.md')) {
                  files.push(fullPath);
                }
              }
              return files;
            }
            filesToCheck = findMarkdownFiles('content/posts');
          }

          if (filesToCheck.length === 0) {
            console.log('No markdown files to validate');
            process.exit(0);
          }

          console.log(`Validating ${filesToCheck.length} files...`);

          let allValid = true;
          for (const file of filesToCheck) {
            if (!validatePost(file)) {
              allValid = false;
            }
          }

          if (!allValid) {
            console.error('Some posts failed validation');
            process.exit(1);
          }

          console.log('All posts passed validation!');
          EOF

          node validate-posts.js

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Post validation failed. Please check the logs and fix any issues with your markdown files.'
            })

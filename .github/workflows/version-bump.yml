name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_type:
        description: 'Prerelease type (only for prerelease)'
        required: false
        type: choice
        options:
          - alpha
          - beta
          - rc
      custom_version:
        description: 'Custom version (e.g., 2.0.0) - overrides version_type'
        required: false
        type: string

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests before bump
        run: npm test

      - name: Determine new version
        id: new_version
        run: |
          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.custom_version }}"
            echo "Using custom version: $NEW_VERSION"
          else
            VERSION_TYPE="${{ github.event.inputs.version_type }}"
            
            if [ "$VERSION_TYPE" = "prerelease" ]; then
              PRERELEASE_TYPE="${{ github.event.inputs.prerelease_type }}"
              if [ -z "$PRERELEASE_TYPE" ]; then
                PRERELEASE_TYPE="beta"
              fi
              NEW_VERSION=$(npm version prerelease --preid=$PRERELEASE_TYPE --no-git-tag-version)
            else
              NEW_VERSION=$(npm version $VERSION_TYPE --no-git-tag-version)
            fi
          fi
          
          # Remove 'v' prefix if present
          NEW_VERSION=${NEW_VERSION#v}
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Update version in files
        run: |
          VERSION="${{ steps.new_version.outputs.version }}"
          
          # Update package.json (already done by npm version)
          
          # Update README.md if it contains version references
          if grep -q "hugo-syndicate@[0-9]" README.md; then
            sed -i.bak "s/hugo-syndicate@[0-9]\+\.[0-9]\+\.[0-9]\+[^ ]*/hugo-syndicate@$VERSION/g" README.md
            rm README.md.bak
          fi
          
          # Update any other files that might contain version
          echo "Version updated to $VERSION"

      - name: Generate changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.new_version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          
          # Get commits since last tag
          if git describe --tags --abbrev=0 2>/dev/null; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            COMMITS=$(git log --pretty=format:"%s" $LAST_TAG..HEAD | grep -v -E "(chore|Version bump|Merge pull)")
          else
            COMMITS=$(git log --pretty=format:"%s" HEAD | grep -v -E "(chore|Version bump|Merge pull)")
          fi
          
          # Parse commits by conventional type
          ADDED=""
          CHANGED=""
          FIXED=""
          REMOVED=""
          OTHER=""
          
          while IFS= read -r commit; do
            if [ -z "$commit" ]; then continue; fi
            
            case "$commit" in
              feat:*|feature:*|add:*)
                MSG=$(echo "$commit" | sed 's/^[a-z]*: *//')
                ADDED="${ADDED}- ${MSG}\n"
                ;;
              fix:*|bugfix:*)
                MSG=$(echo "$commit" | sed 's/^[a-z]*: *//')
                FIXED="${FIXED}- ${MSG}\n"
                ;;
              update:*|change:*|improve:*|enhance:*)
                MSG=$(echo "$commit" | sed 's/^[a-z]*: *//')
                CHANGED="${CHANGED}- ${MSG}\n"
                ;;
              remove:*|delete:*)
                MSG=$(echo "$commit" | sed 's/^[a-z]*: *//')
                REMOVED="${REMOVED}- ${MSG}\n"
                ;;
              docs:*|test:*|refactor:*|perf:*|style:*)
                # Skip in user-facing changelog
                ;;
              *)
                OTHER="${OTHER}- ${commit}\n"
                ;;
            esac
          done <<< "$COMMITS"
          
          # Build changelog entry
          CHANGELOG_ENTRY="## [$VERSION] - $DATE\n"
          
          if [ -n "$ADDED" ]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}\n### Added\n${ADDED}"
          fi
          
          if [ -n "$CHANGED" ]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}\n### Changed\n${CHANGED}"
          fi
          
          if [ -n "$FIXED" ]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}\n### Fixed\n${FIXED}"
          fi
          
          if [ -n "$REMOVED" ]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}\n### Removed\n${REMOVED}"
          fi
          
          if [ -n "$OTHER" ] && [ -z "$ADDED$CHANGED$FIXED$REMOVED" ]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}\n### Changed\n${OTHER}"
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG_ENTRY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.new_version.outputs.version }}"
          
          # Create CHANGELOG.md if it doesn't exist
          if [ ! -f CHANGELOG.md ]; then
            cat > CHANGELOG.md << 'EOF'
# Changelog

All notable changes to Hugo Syndicate will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

EOF
          fi
          
          # Add new entry after the header
          TEMP_FILE=$(mktemp)
          
          # Extract header (first 6 lines)
          head -6 CHANGELOG.md > $TEMP_FILE
          
          # Add new version entry
          echo "" >> $TEMP_FILE
          echo -e "${{ steps.changelog.outputs.changelog }}" >> $TEMP_FILE
          echo "" >> $TEMP_FILE
          
          # Add the rest of the file
          tail -n +7 CHANGELOG.md >> $TEMP_FILE 2>/dev/null || true
          
          # Replace the original file
          mv $TEMP_FILE CHANGELOG.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        id: cpr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.new_version.outputs.version }}"
          title: "Release: v${{ steps.new_version.outputs.version }}"
          body: |
            ## Version Bump to v${{ steps.new_version.outputs.version }}
            
            This PR bumps the version to `${{ steps.new_version.outputs.version }}`.
            
            ### Changelog
            ${{ steps.changelog.outputs.changelog }}
            
            ### Checklist
            - [ ] Tests pass
            - [ ] Version updated in package.json
            - [ ] CHANGELOG.md updated
            - [ ] README.md version references updated (if applicable)
            
            ### Next Steps
            1. Review and merge this PR
            2. Create and push a tag: `git tag v${{ steps.new_version.outputs.version }} && git push origin v${{ steps.new_version.outputs.version }}`
            3. The release workflow will automatically run
          branch: release/v${{ steps.new_version.outputs.version }}
          delete-branch: true
          labels: |
            release
            automated

      - name: Create summary
        run: |
          echo "## Version Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **New Version**: ${{ steps.new_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ github.event.inputs.version_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pull Request**: #${{ steps.cpr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the PR: #${{ steps.cpr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Merge when ready" >> $GITHUB_STEP_SUMMARY
          echo "3. Tag the release: \`git tag v${{ steps.new_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Push the tag: \`git push origin v${{ steps.new_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
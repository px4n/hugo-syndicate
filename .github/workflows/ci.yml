name: CI

on:
  push:
    branches-ignore:
      - develop
  pull_request:
    branches-ignore:
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == '18'
        run: npm run test:coverage

      - name: Upload coverage
        if: matrix.node-version == '18'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node -c hugo-syndicate.js

      - name: Validate package.json
        run: npm ls --depth=0

      - name: Check executable permissions
        run: |
          if [ ! -x "hugo-syndicate.js" ]; then
            echo "hugo-syndicate.js is not executable"
            exit 1
          fi
          echo "hugo-syndicate.js has correct permissions"

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test CLI installation
        run: |
          # Test npm pack and installation
          npm pack
          npm install -g ./hugo-syndicate-*.tgz

          # Verify CLI command exists
          which hugo-syndicate

          # Clean up
          npm uninstall -g hugo-syndicate

      - name: Test environment validation
        run: |
          # Test that script validates environment correctly
          output=$(node hugo-syndicate.js 2>&1 || true)
          if echo "$output" | grep -q "DEVTO_API_KEY environment variable is not set"; then
            echo "Environment validation works correctly"
          else
            echo "Environment validation failed"
            echo "Output: $output"
            exit 1
          fi

      - name: Test with mock environment
        env:
          DEVTO_API_KEY: "test_key_for_validation_only"
          HUGO_BASE_URL: "https://test.com"
          DEBUG_LEVEL: "0"
        run: |
          # This should fail at API connection but pass environment validation
          timeout 10s node hugo-syndicate.js 2>&1 || true
          echo "Mock environment test completed"

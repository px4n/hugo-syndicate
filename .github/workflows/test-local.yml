# Simplified workflow for local testing with act
name: Local Test

on:
  push:
    branches-ignore:
      - develop
  pull_request:
    branches-ignore:
      - develop

jobs:
  test-simple:
    name: Simple Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      - name: Run tests
        run: |
          echo "Running tests..."
          npm test

      - name: Check file
        run: |
          echo "Checking hugo-syndicate.js exists..."
          ls -la hugo-syndicate.js
          echo "File check completed"
